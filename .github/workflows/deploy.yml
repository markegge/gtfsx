name: Deploy

on:
  push:
    branches: [main]
    tags: ['prod-*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options: [staging, production]

permissions:
  contents: read

concurrency:
  # Serialize deploys per-environment so two pushes don't race.
  # Production and staging can deploy in parallel; same-environment runs queue.
  group: cloudflare-deploy-${{ startsWith(github.ref, 'refs/tags/prod-') && 'prod' || 'staging' }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Staging — pushes to main auto-deploy here. Backend kill switches ON.
  # ──────────────────────────────────────────────────────────────────────
  staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (staging — backend on)
        run: npm run build
        env:
          VITE_BACKEND_ENABLED: 'true'
          VITE_BILLING_ENABLED: 'true'
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
      - name: Deploy to staging
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────
  # Production — tag a commit `prod-YYYY-MM-DD[.N]` to ship it. Kill
  # switches OFF until the matching wrangler.jsonc + env flags are flipped.
  # ──────────────────────────────────────────────────────────────────────
  production:
    if: startsWith(github.ref, 'refs/tags/prod-')
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (prod — backend kill switch on)
        run: npm run build
        env:
          # Mirror the wrangler.jsonc top-level BACKEND_ENABLED / BILLING_ENABLED
          # kill switches. Flip both pairs in lockstep when re-enabling backend
          # features on prod (see docs/WORKFLOW.md).
          VITE_BACKEND_ENABLED: 'false'
          VITE_BILLING_ENABLED: 'false'
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
      - name: Deploy to production
        run: npx wrangler deploy --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
