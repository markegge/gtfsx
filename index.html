  <body>
    <!-- Visually-hidden but indexable H1. The homepage IS the editor (no marketing
         hero), so we surface the primary keyword cluster ("gtfs editor", "free gtfs
         editor") in an H1 the crawlers see while staying invisible to sighted users.
         Standard accessibility (clip-rect) pattern — endorsed by Google for this use.
         `data-home-only` marks it for removal by the marketing + forum SSR rewriters
         on non-homepage routes, which have their own page-topic H1s. -->
    <h1 data-home-only style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;">Fast, Free GTFS Editor</h1>
    <div id="root"></div>
    <noscript>
      <div style="font-family: sans-serif; max-width: 760px; margin: 60px auto; padding: 0 20px; line-height: 1.6; color: #2A1F18;">
        <!-- Brand mark inside the no-JS fallback. Was an <h1> until 2026-05-22; demoted
             to a styled <p> so crawlers (which render <noscript>) see only the page-topic
             H1 instead of a duplicate brand H1. -->
        <p style="font-size:2em;font-weight:bold;margin:0 0 4px;">GTFS·X</p>
        <p style="font-size: 1.15rem; color: #6B5A4D; margin-top: 0;">The online GTFS feed editor. Free to use; paid plans add publishing and analytical tools.</p>

        <p>GTFS·X is a free, browser-based editor for creating and editing GTFS (General Transit Feed Specification) feeds. Build complete transit schedules — agencies, routes, stops, timetables, fares, calendars, and demand-responsive zones — directly in your browser, with no account, no installation, and no data leaving your machine.</p>

        <h2>Built for</h2>
        <ul>
          <li>Small and mid-size transit agencies publishing or updating their own GTFS feed</li>
          <li>Microtransit and dial-a-ride operators that need GTFS-Flex booking rules</li>
          <li>Transportation planning consultants sketching service alternatives</li>
          <li>Researchers and students building example feeds for analysis</li>
        </ul>

        <h2>Features</h2>
        <ul>
          <li>Draw routes on an interactive Mapbox map with snap-to-road</li>
          <li>Place stops along routes with curbside-correct positioning</li>
          <li>Timetable grid editor with auto-interpolation and trip duplication</li>
          <li>Service calendars with bulk holiday exception support</li>
          <li>Fare structures including zone-based fare matrices</li>
          <li>Full GTFS-Flex support — polygon zones, pickup/drop-off windows, booking rules</li>
          <li>Continuous validation against the GTFS spec</li>
          <li>Import and export standards-compliant GTFS ZIP files</li>
          <li>Census-based demographic and equity coverage analysis</li>
        </ul>

        <h2>Learn more</h2>
        <ul>
          <li><a href="/about/">About GTFS·X</a> — what the tool is and who it's for</li>
          <li><a href="/docs/">Documentation</a> — step-by-step walkthrough of every feature</li>
          <li><a href="/learn/gtfs/">What is GTFS?</a> — a plain-English introduction to the spec</li>
          <li><a href="/learn/gtfs-flex/">What is GTFS-Flex?</a> — demand-responsive transit in GTFS</li>
        </ul>

        <p><strong>To use the editor itself, please enable JavaScript.</strong></p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
